{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block head %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .error-card {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 10px;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .error-code {
      font-size: 4rem;
      font-weight: 800;
      color: #e4e4e7;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.75rem;
    }
    .error-text {
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    .error-home {
      display: inline-block;
      padding: 0.6rem 1.25rem;
      background: #111;
      color: #fff;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
    }
    .error-home:hover { background: #333; }
  </style>
{% endblock %}

{% block body %}
  <div class="error-card">
    <p class="error-code">500</p>
    <h1 class="error-title">Something went wrong</h1>
    <p class="error-text">An unexpected error occurred on our end. Please try again in a moment.</p>
    <a href="/" class="error-home">Go to homepage</a>
  </div>
{% endblock %}
