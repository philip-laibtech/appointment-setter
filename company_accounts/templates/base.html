<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Appointment Setter{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }
    nav { background: #fff; border-bottom: 1px solid #ddd; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #111; text-decoration: none; }
    nav a { color: #555; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { color: #111; text-decoration: underline; }
    nav .spacer { flex: 1; }
    main { max-width: 600px; margin: 2.5rem auto; padding: 0 1rem; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.35rem; }
    input[type=email], input[type=password], input[type=text] {
      width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;
    }
    input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    button[type=submit] {
      width: 100%; padding: 0.65rem; background: #111; color: #fff; border: none;
      border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem;
    }
    button[type=submit]:hover { background: #333; }
    .messages { margin-bottom: 1rem; }
    .messages li { list-style: none; padding: 0.6rem 0.75rem; border-radius: 4px; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .messages .error { background: #fee2e2; color: #b91c1c; }
    .messages .success { background: #dcfce7; color: #166534; }
    .field-errors { color: #b91c1c; font-size: 0.85rem; margin-top: 0.25rem; }
    .info-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    .info-table th, .info-table td { text-align: left; padding: 0.5rem 0.25rem; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    .info-table th { color: #666; font-weight: 600; width: 45%; }
    .link-muted { color: #888; font-size: 0.9rem; margin-top: 1rem; display: block; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">Appointment Setter</a>
    <span class="spacer"></span>
    {% if user.is_authenticated %}
      <a href="{% url 'company_accounts:dashboard' %}">Dashboard</a>
      <form method="post" action="{% url 'company_accounts:logout' %}" style="margin:0">
        {% csrf_token %}
        <button type="submit" style="background:none;border:none;color:#555;cursor:pointer;font-size:0.95rem;padding:0;">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'company_accounts:login' %}">Login</a>
      <a href="{% url 'company_accounts:register' %}">Register</a>
    {% endif %}
  </nav>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
