{% extends "base.html" %}
{% block title %}Reset Password — Appointment Setter{% endblock %}

{% block content %}
<div class="card">
  <h1>Reset your password</h1>
  <p style="font-size:0.9rem;color:#6b7280;margin-bottom:1.25rem;line-height:1.6;">
    Enter the email address you registered with. If an account exists, you will receive a link to set a new password.
  </p>
  <form method="post" novalidate>
    {% csrf_token %}
    <div class="form-group">
      <label for="id_email">Email address</label>
      <input type="email" id="id_email" name="email"
             autocomplete="email" autofocus required
             style="width:100%;padding:0.55rem 0.75rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;">
    </div>
    <button type="submit">Send reset link</button>
  </form>
  <a class="link-muted" href="{% url 'company_accounts:login' %}">Back to login</a>
</div>
{% endblock %}
