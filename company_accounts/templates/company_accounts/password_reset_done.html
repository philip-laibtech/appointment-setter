{% extends "auth_base.html" %}
{% block title %}Check Your Email — Appointment Setter{% endblock %}

{% block content %}
<div class="card" style="text-align:center;">
  <div style="width:48px;height:48px;border-radius:12px;background:#f0fdf4;border:1px solid #bbf7d0;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
  </div>
  <h1 style="font-size:1.3rem;margin-bottom:0.75rem;">Check your inbox</h1>
  <p style="font-size:0.9rem;color:#6b7280;line-height:1.6;margin-bottom:1.5rem;">
    If an account with that email exists, we've sent a password reset link. It will expire in 24 hours.
  </p>
  <a class="link-muted" href="{% url 'company_accounts:login' %}">Back to login</a>
</div>
{% endblock %}
