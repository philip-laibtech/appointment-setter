{% extends "base.html" %}
{% block title %}Simple appointment booking for your business{% endblock %}
{% block content %}
<div class="card" style="text-align:center;padding:3rem 2rem;">
  <h1 style="font-size:1.75rem;margin-bottom:2rem;">Simple appointment booking for your business</h1>
  <div style="display:flex;flex-direction:column;gap:0.75rem;max-width:260px;margin:0 auto;">
    <a href="{% url 'company_accounts:register' %}"
       style="display:block;padding:0.7rem 1.25rem;background:#111;color:#fff;text-decoration:none;border-radius:4px;font-size:1rem;">
      Let&#39;s get started
    </a>
    <a href="{% url 'company_accounts:login' %}"
       style="display:block;padding:0.7rem 1.25rem;background:#fff;color:#111;text-decoration:none;border-radius:4px;font-size:1rem;border:1px solid #ccc;">
      Login
    </a>
  </div>
</div>
{% endblock %}
