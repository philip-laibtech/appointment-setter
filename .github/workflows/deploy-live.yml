name: Deploy live

# Runs after "Build and push image" finishes for main — deploys the
# just-built <branch>-<sha> tag to terminklick.ch over SSH via the
# restricted deploy-app.sh wrapper. The "production" environment requires
# manual reviewer approval before this job runs (GitHub → Settings →
# Environments) — nothing reaches customers without a human clicking
# approve.
on:
  workflow_run:
    workflows: ["Build and push image"]
    branches: ["main"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - id: tag
        run: echo "tag=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "sudo /usr/local/bin/deploy-app.sh live ${{ steps.tag.outputs.tag }}"
